<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      /* content start */
      /* 內容樣式放裡面 */

      /* content end */

      /* 全域設定 -- 勿更動 */
      body {
        margin: 0;
        padding-top: 68px;
      }
      @media (max-width: 768px) {
        body {
          padding-top: 56px;
        }
      }

      /* 全域設定 -- 勿更動 */

      /* header start */
      #ch-header,
      #ch-header div,
      #ch-header span,
      #ch-header h1,
      #ch-header p,
      #ch-header a,
      #ch-header ol,
      #ch-header ul,
      #ch-header li {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 100%;
        font: inherit;
        vertical-align: baseline;
        box-sizing: border-box;
      }

      #ch-header a {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 100%;
        font: inherit;
        vertical-align: baseline;
        display: flex;
      }

      #ch-header #ch-container {
        width: 100%;
        padding-right: 15px;
        padding-left: 15px;
        margin-right: auto;
        margin-left: auto;
      }

      @media (min-width: 768px) {
        #ch-header #ch-container {
          max-width: 720px;
        }
      }

      @media (min-width: 992px) {
        #ch-header #ch-container {
          max-width: 960px;
        }
      }

      @media (min-width: 1200px) {
        #ch-header #ch-container {
          max-width: 1140px;
        }
      }

      #ch-header h1 img {
        height: 48px;
      }

      @media (max-width: 768px) {
        #ch-header h1 img {
          height: 32px;
        }
      }

      #ch-header {
        position: fixed;
        width: 100%;
        top: 0;
        left: 0;
        background-color: #fff;
        -webkit-box-shadow: 1px 3px 5px rgba(0, 0, 0, 0.2);
        box-shadow: 1px 3px 5px rgba(0, 0, 0, 0.2);
        z-index: 5;
      }

      @media (max-width: 768px) {
        #ch-header {
          padding: 8px 0;
        }
      }

      #ch-header #ch-container {
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        -webkit-box-pack: justify;
        -ms-flex-pack: justify;
        justify-content: space-between;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
      }

      #ch-header ul {
        display: flex !important;
        list-style: none;
      }

      #ch-header ul li a {
        padding: 23px 12px;
        display: inline-table;
        text-decoration: none;
        color: #222;
        -webkit-transition: all 0.5s;
        transition: all 0.5s;
      }

      #ch-header ul li a:hover {
        color: #094;
      }

      @media (max-width: 768px) {
        #ch-header ul li a {
          font-size: 20px;
          padding: 15px 20px;
        }
      }

      @media (max-width: 568px) {
        #ch-header ul li a {
          font-size: 18px;
        }
      }

      #ch-header #ch-social-group {
        display: flex !important;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        justify-content: center;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
      }

      @media (max-width: 768px) {
        #ch-header #ch-social-group {
          margin-top: 15px;
        }
      }

      #ch-header .ch-social {
        font-size: 40px;
      }

      #ch-header .ch-social a {
        padding: 0 12px;
        line-height: 36px;
        color: #979696;
      }

      #ch-header .ch-social a:hover {
        border-bottom: 0;
        padding: 0 12px;
      }

      @media (max-width: 568px) {
        #ch-header .ch-social a {
          font-size: 40px;
          color: #fff;
        }
      }

      #ch-header .ch-social i {
        vertical-align: bottom;
      }

      #ch-header #ch-button-toggle {
        display: none;
        position: relative;
        width: 40px;
        height: 40px;
        z-index: 10000;
        cursor: pointer;
      }

      @media (max-width: 768px) {
        #ch-header #ch-button-toggle {
          display: block;
        }
      }

      #ch-header #ch-button-toggle span {
        display: block;
        position: absolute;
        width: 30px;
        height: 2px;
        top: 50%;
        left: 50%;
        -webkit-transform: translateX(-50%);
        transform: translateX(-50%);
        background-color: #000;
      }

      #ch-header #ch-button-toggle span::after,
      #ch-header #ch-button-toggle span::before {
        -webkit-transition: all 0.5s;
        transition: all 0.5s;
        position: absolute;
        content: '';
        display: block;
        width: 100%;
        top: 50%;
        height: 2px;
        background-color: #000;
      }

      #ch-header #ch-button-toggle span::before {
        top: -8px;
      }

      #ch-header #ch-button-toggle span::after {
        bottom: -8px;
        top: auto;
      }

      #ch-header #ch-button-toggle.active span {
        background-color: transparent;
      }

      #ch-header #ch-button-toggle.active span::after,
      #ch-header #ch-button-toggle.active span::before {
        top: 0;
      }

      #ch-header #ch-button-toggle.active span::before {
        -webkit-transform: rotate(45deg);
        transform: rotate(45deg);
      }

      @media (max-width: 768px) {
        #ch-header #ch-button-toggle.active span::before {
          background-color: #000;
        }
      }

      #ch-header #ch-button-toggle.active span::after {
        -webkit-transform: rotate(-45deg);
        transform: rotate(-45deg);
      }

      @media (max-width: 768px) {
        #ch-header #ch-button-toggle.active span::after {
          background-color: #000;
        }
      }

      @media (max-width: 768px) {
        #ch-header ul {
          position: absolute;
          left: 0;
          top: 0;
          height: 0px;
          background-color: #fff;
          -webkit-transition: all 0.5s;
          transition: all 0.5s;
          overflow: hidden;
          z-index: 120;
          display: -webkit-box;
          display: -ms-flexbox;
          display: flex;
          -webkit-box-orient: vertical;
          -webkit-box-direction: normal;
          -ms-flex-direction: column;
          flex-direction: column;
          -webkit-box-pack: center;
          -ms-flex-pack: center;
          justify-content: center;
          opacity: 0;
        }

        #ch-header ul.opening {
          height: 100vh;
          width: 100%;
          opacity: 1;
          visibility: visible;
          background-color: #fff;
        }

        #ch-header ul li {
          width: 100vw;
          text-align: center;
        }
      }
      /* header end */

      /* footer start */
      footer {
        width: 100%;
        padding: 30px 0;
        color: #373737;
        background: #fff;
      }
      footer a {
        transition: 0.3s;
        text-decoration: none;
      }

      footer ul {
        list-style-type: none;
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        justify-content: center;
        padding: 0;
        margin: 0;
      }

      footer ul li {
        font-size: 15px;
        line-height: 15px;
        border-right: 1px solid #373737;
        padding: 0 10px 0 0;
        margin: 0 10px 10px 0;
      }

      footer ul li:last-child {
        border: none;
        padding: 0;
        margin: 0;
      }

      footer ul li a {
        color: #373737;
        line-height: 15px;
      }

      footer ul:last-child {
        margin: 0;
      }

      footer p {
        color: #373737;
        font-size: 14px;
        line-height: 24px;
        font-weight: 300;
        text-align: center;
        margin-top: 0;
        margin-bottom: 10px;
      }

      @media (max-width: 768px) {
        footer ul {
          -ms-flex-wrap: wrap;
          flex-wrap: wrap;
        }
        footer ul li {
          padding: 0 5px 0 0;
          margin: 0 5px 10px 0;
        }
      }

      /* footer end */
    </style>

    <script>
      // 點擊選單開關按鈕
      $('#ch-button-toggle').click(function (e) {
        e.preventDefault()
        $(this).toggleClass('active')
        $('#ch-nav-wrap').toggleClass('opening')
      })

      // 點擊導覽區塊收合選單
      $('#ch-nav-wrap').click(function () {
        $(this).toggleClass('opening')
        $('#ch-button-toggle').toggleClass('active')
      })

      // 點擊導覽內部連結，平滑滾動
      $('#ch-nav-wrap a[href^="#"]').on('click', function (e) {
        const target = $(this.getAttribute('href'))
        if (target.length) {
          e.preventDefault()
          $('html, body').stop().animate(
            {
              scrollTop: target.offset().top,
            },
            1000
          )
        }
      })
    </script>

    <!-- script start -->
    <script>
      // iframe RWD
      window.addEventListener('message', function (event) {
        // 安全限制：檢查來源
        if (event.origin !== 'https://web.commonhealth.com.tw') return

        // 找出傳送訊息的 iframe
        const iframes = document.querySelectorAll('iframe')
        for (const iframe of iframes) {
          if (iframe.contentWindow === event.source) {
            iframe.style.height = event.data.height + 'px'
            break
          }
        }
      })
    </script>
